name: Docs Checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: ci/docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: README/help sync gate (observe mode)
        env:
          QUALITY_GATES_MODE: observe
        run: pnpm check:docs

      - name: Determine governance base ref
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "GOVERNANCE_BASE_REF=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            echo "GOVERNANCE_BASE_REF=${{ github.event.before }}" >> "$GITHUB_ENV"
          else
            echo "GOVERNANCE_BASE_REF=HEAD~1" >> "$GITHUB_ENV"
          fi

      - name: Governance gate (observe mode)
        env:
          QUALITY_GATES_MODE: observe
        run: pnpm check:governance

      - name: Markdown links (observe mode)
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: --no-progress --exclude-mail --exclude-loopback README.md docs/**/*.md
          format: markdown
