name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ci/test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  coverage:
    name: ci/coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run coverage
        run: pnpm test:coverage

      - name: Determine coverage base ref
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "COVERAGE_BASE_REF=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            echo "COVERAGE_BASE_REF=${{ github.event.before }}" >> "$GITHUB_ENV"
          else
            echo "COVERAGE_BASE_REF=HEAD~1" >> "$GITHUB_ENV"
          fi

      - name: Coverage thresholds and regression gate (observe mode)
        env:
          QUALITY_GATES_MODE: observe
          COVERAGE_MIN_LINES: "93"
          COVERAGE_MIN_BRANCHES: "90"
        run: pnpm check:coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/coverage-summary.json
            coverage/lcov.info
          if-no-files-found: warn
