name: Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Release operation"
        required: true
        default: "prepare"
        type: choice
        options:
          - prepare
          - publish

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  prepare:
    if: ${{ inputs.mode == 'prepare' }}
    runs-on: ubuntu-latest
    steps:
      - name: Ensure main branch
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Release prepare must be run from main. Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Create or Update Release PR
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: echo "Prepare mode; publish intentionally skipped"
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    if: ${{ inputs.mode == 'publish' }}
    runs-on: ubuntu-latest
    steps:
      - name: Ensure main branch
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Release publish must be run from main. Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Configure npm for trusted publishing
        run: |
          cat > "$RUNNER_TEMP/.npmrc" <<'EOF'
          registry=https://registry.npmjs.org
          EOF
          echo "NPM_CONFIG_USERCONFIG=$RUNNER_TEMP/.npmrc" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish to npm with provenance
        run: pnpm release
        env:
          NPM_CONFIG_PROVENANCE: "true"
